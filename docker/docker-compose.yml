services:
  homemail:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: homemail
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ~/homemail/.env
    volumes:
      - ~/homemail/Raw:/opt/homemail/Raw
      - ~/homemail/Organized:/opt/homemail/Organized
      - ~/homemail/Reports:/opt/homemail/Reports
      # Optional: mount a custom config.toml (uncomment to use)
      # - ~/homemail/my-config.toml:/opt/homemail/_pipeline/config.toml:ro
